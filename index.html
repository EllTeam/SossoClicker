<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SossoClicker</title>

<style>
body{
    background:#222;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

#score{
    font-size:40px;
    margin:20px;
}

/* SOSSO BILD */
#sosso{
    width:250px;
    cursor:pointer;
    transition:transform 0.1s;
}

/* klick-animation */
#sosso:active{
    transform:scale(0.9);
}
</style>
</head>

<body>

<h1>SossoClicker</h1>

<div id="score">0</div>

<!-- SOSSO -->
<img src="sosso.png" id="sosso" onclick="clickSosso()">

<script>
let score = 0;

function clickSosso(){
    score++;
    document.getElementById("score").textContent = score;
}
</script>

</body>
</html>
